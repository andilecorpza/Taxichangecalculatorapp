name: Android Build (FULL FIX AIDL)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: $HOME/android-sdk

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 🔥 Make Gradle executable
    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install required tools
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip zip

    - name: Install Android SDK (REAL AIDL FIX)
      run: |
        mkdir -p $ANDROID_HOME/cmdline-tools

        cd $HOME
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
        unzip sdk.zip

        mkdir -p $ANDROID_HOME/cmdline-tools/latest
        mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/

        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses

        # 🔥 CRITICAL FIX: install correct build-tools that include AIDL
        sdkmanager \
          "platform-tools" \
          "platforms;android-33" \
          "build-tools;33.0.2"

        # verify aidl exists
        ls $ANDROID_HOME/build-tools/33.0.2/ || true

    - name: Export Android paths
      run: |
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
        echo "$HOME/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH

    # 🔥 Force Gradle to use SDK correctly
    - name: Set local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    # 🔥 Build APK
    - name: Build Debug APK
      run: ./gradlew clean assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
