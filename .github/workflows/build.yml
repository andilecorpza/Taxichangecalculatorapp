name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer and System Dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev libbz2-dev libsqlite3-dev libffi-dev libssl-dev

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17
