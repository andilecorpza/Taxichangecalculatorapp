name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROIDSDK: /home/runner/android-sdk
      ANDROIDNDK: /home/runner/android-sdk/ndk/25.2.9519653

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses-dev libbz2-dev libsqlite3-dev libffi-dev libssl-dev

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK Components
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

    - name: Build APK with Buildozer
      env:
        ANDROIDAPI: 34
        ANDROIDSDKAPI: 34
        BUILDTOOLS: 34.0.0
      run: buildozer android debug
